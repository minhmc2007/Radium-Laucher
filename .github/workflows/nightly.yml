name: Nightly Build and Release
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            os: windows-latest
            artifact_name: Radium-Nightly-Windows-x64-Portable
            artifact_ext: .exe
            build_cmd: flutter build windows --release

          - id: macos-arm64
            os: macos-14
            artifact_name: Radium-Nightly-macOS-ARM64
            artifact_ext: .zip
            build_cmd: flutter build macos --release

          - id: linux-x64
            os: ubuntu-latest
            artifact_name: Radium-Nightly-Linux-x64
            artifact_ext: .AppImage
            build_cmd: flutter build linux --release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        if: matrix.id == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build
        run: ${{ matrix.build_cmd }}

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Package – macOS (zip)
        if: matrix.id == 'macos-arm64'
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -ry ../../../../../Radium-Nightly-macOS-ARM64.zip *.app

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Package – Windows (portable SFX exe)
        if: matrix.id == 'windows-x64'
        shell: powershell
        run: |
          $exeName = (Get-ChildItem "build\windows\x64\runner\Release\*.exe" |
                      Select-Object -First 1).Name
          Write-Host "Detected exe: $exeName"

          # Download 7-zip Extra and extract SFX stub with -r (recursive search)
          Invoke-WebRequest "https://www.7-zip.org/a/7z2409-extra.7z" -OutFile "7z-extra.7z"
          & "C:\Program Files\7-Zip\7z.exe" e "7z-extra.7z" "7zSD.sfx" -r -y

          if (-not (Test-Path "7zSD.sfx")) {
            Write-Host "== Archive contents for debugging =="
            & "C:\Program Files\7-Zip\7z.exe" l "7z-extra.7z"
            throw "7zSD.sfx was not found in the archive. See listing above."
          }

          # SFX config — tells the stub which exe to run after extraction
          $sfxConfig = ";!@Install@!UTF-8!`nTitle=`"Radium`"`nRunProgram=`"$exeName`"`n;!@InstallEnd@!"
          [System.IO.File]::WriteAllText(
            "$PWD\sfx_config.txt",
            $sfxConfig,
            [System.Text.UTF8Encoding]::new($false)
          )

          # Pack release folder
          & "C:\Program Files\7-Zip\7z.exe" a -t7z -mx=5 "payload.7z" `
              ".\build\windows\x64\runner\Release\*"

          # Stitch into one portable exe
          cmd /c "copy /b 7zSD.sfx + sfx_config.txt + payload.7z Radium-Nightly-Windows-x64-Portable.exe"
          if (-not (Test-Path "Radium-Nightly-Windows-x64-Portable.exe")) {
            throw "Final exe was not created — copy /b failed."
          }
          Write-Host "Done: $(Get-Item Radium-Nightly-Windows-x64-Portable.exe | Select-Object -ExpandProperty Length) bytes"

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Package – Linux (AppImage)
        if: matrix.id == 'linux-x64'
        shell: bash
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          APPDIR="Radium.AppDir"

          # Auto-detect the Flutter binary (first executable at bundle root)
          BINARY_PATH=$(find "${BUNDLE}" -maxdepth 1 -type f -executable | head -1)
          BINARY_NAME=$(basename "${BINARY_PATH}")
          echo "Detected binary: ${BINARY_NAME}"

          # ── Build AppDir layout ────────────────────────────────────────────
          mkdir -p "${APPDIR}"
          cp "${BINARY_PATH}"       "${APPDIR}/"
          cp -r "${BUNDLE}/lib"     "${APPDIR}/" 2>/dev/null || true
          cp -r "${BUNDLE}/data"    "${APPDIR}/" 2>/dev/null || true

          # AppRun: sets LD_LIBRARY_PATH and execs the binary
          cat > "${APPDIR}/AppRun" << EOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          export LD_LIBRARY_PATH="\${HERE}/lib:\${LD_LIBRARY_PATH}"
          exec "\${HERE}/${BINARY_NAME}" "\$@"
          EOF
          chmod +x "${APPDIR}/AppRun"

          # .desktop file – required by appimagetool
          cat > "${APPDIR}/radium.desktop" << EOF
          [Desktop Entry]
          Name=Radium
          Exec=${BINARY_NAME}
          Icon=radium
          Type=Application
          Categories=AudioVideo;
          EOF

          # Icon – use first project PNG asset if available, otherwise placeholder
          ICON=$(find assets linux -maxdepth 3 -name "*.png" 2>/dev/null | head -1)
          if [ -n "${ICON}" ]; then
            cp "${ICON}" "${APPDIR}/radium.png"
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk\
          YPj/HwADBgEB1gVHGQAAAABJRU5ErkJggg==" | base64 -d > "${APPDIR}/radium.png"
          fi

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool

          # APPIMAGE_EXTRACT_AND_RUN=1 bypasses FUSE (unavailable on GH Actions runners)
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            ./appimagetool "${APPDIR}" "Radium-Nightly-Linux-x64.AppImage"

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ matrix.artifact_ext }}
          retention-days: 1

  release:
    name: Create Tag and Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate Tag Name
        run: |
          TAG="nightly-$(date +'%Y%m%d-%H%M')"
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Nightly Build: ${{ env.TAG_NAME }}"
          files: release-assets/*
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
