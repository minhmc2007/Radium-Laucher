name: Nightly Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Fixes Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Allows other builds to finish even if one fails
      matrix:
        include:
          - id: windows-x64
            os: windows-latest
            artifact_name: Radium-Nightly-Windows-x64
            build_cmd: flutter build windows
            # Correctly packages EXE + DLLs + Data for portability
            package_cmd: PowerShell -Command "Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Radium-Nightly-Windows-x64.zip"
            
          - id: macos-arm64
            os: macos-14 # Apple Silicon Runner
            artifact_name: Radium-Nightly-macOS-ARM64
            build_cmd: flutter build macos --release
            # Uses *.app to handle typos like "Laucher" vs "Launcher"
            package_cmd: |
              cd build/macos/Build/Products/Release
              zip -ry ../../../../Radium-Nightly-macOS-ARM64.zip *.app

          - id: linux-x64
            os: ubuntu-latest
            artifact_name: Radium-Nightly-Linux-x64
            build_cmd: flutter build linux
            package_cmd: |
              cd build/linux/x64/release/bundle
              zip -r ../../../../../Radium-Nightly-Linux-x64.zip .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        if: matrix.id == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Package
        shell: bash
        run: ${{ matrix.package_cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 1

  release:
    name: Create Tag and Release
    # 🚨 This ensures no tag is created if ANY build in the matrix fails
    needs: [build] 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate Tag Name
        id: tag
        run: |
          TAG="nightly-$(date +'%Y%m%d-%H%M')"
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Nightly Build: ${{ env.TAG_NAME }}"
          files: release-assets/*.zip
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
