name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Tag (e.g. v1.1.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write                  # needed to create a release

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.1'     # consistent with nightly
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ----- Windows -----
      - name: Build Windows
        if: matrix.target == 'windows'
        run: |
          flutter build windows
          7z a Radium-Windows-Portable.zip ./build/windows/x64/release/bundle/*

      # ----- Linux -----
      - name: Build Linux (AppImage)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libgcrypt20-dev
          flutter build linux

          # Download appimagetool
          wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Prepare AppDir structure
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # Create .desktop file
          cat > AppDir/radium.desktop <<EOF
          [Desktop Entry]
          Name=Radium
          Exec=radium_launcher
          Icon=icon
          Type=Application
          Categories=Game;
          EOF

          # Copy icon (fallback if missing)
          cp assets/icon.png AppDir/icon.png || touch AppDir/icon.png

          # Build AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir Radium-Linux-x86_64.AppImage

      # ----- macOS -----
      - name: Build macOS (Universal)
        if: matrix.target == 'macos'
        run: |
          flutter build macos --universal
          cd build/macos/Build/Products/Release
          zip -r ../../../../Radium-MacOS-Universal.zip "Radium Launcher.app"

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            Radium-Windows-Portable.zip
            Radium-Linux-x86_64.AppImage
            Radium-MacOS-Universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
